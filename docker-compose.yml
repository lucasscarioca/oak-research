services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: oakresearch
      POSTGRES_USER: oakresearch
      POSTGRES_PASSWORD: oakresearch
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oakresearch -d oakresearch"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql://oakresearch:oakresearch@db:5432/oakresearch
      SOURCE_STORAGE_PATH: /data/oakresearch
      APP_SECRET: ${APP_SECRET:-change-me-in-production}
      SESSION_SECRET: ${SESSION_SECRET:-change-me-in-production}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      ENVIRONMENT: ${ENVIRONMENT:-development}
    command: ["uv", "run", "oakresearch", "migrate"]
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - source-data:/data/oakresearch

  api:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql://oakresearch:oakresearch@db:5432/oakresearch
      SOURCE_STORAGE_PATH: /data/oakresearch
      APP_SECRET: ${APP_SECRET:-change-me-in-production}
      SESSION_SECRET: ${SESSION_SECRET:-change-me-in-production}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      ENVIRONMENT: ${ENVIRONMENT:-development}
    command: >
      uv run uvicorn oakresearch.main:app
      --host 0.0.0.0
      --port 8000
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "8000:8000"
    volumes:
      - source-data:/data/oakresearch
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()"]
      interval: 5s
      timeout: 5s
      retries: 10

  worker:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql://oakresearch:oakresearch@db:5432/oakresearch
      SOURCE_STORAGE_PATH: /data/oakresearch
      APP_SECRET: ${APP_SECRET:-change-me-in-production}
      SESSION_SECRET: ${SESSION_SECRET:-change-me-in-production}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      ENVIRONMENT: ${ENVIRONMENT:-development}
    command: >
      uv run uvicorn oakresearch.worker:app
      --host 0.0.0.0
      --port 8001
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "8001:8001"
    volumes:
      - source-data:/data/oakresearch
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health').read()"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build:
      context: ./web
    environment:
      VITE_API_BASE_URL: http://localhost:8000
      VITE_WORKER_BASE_URL: http://localhost:8001
    depends_on:
      api:
        condition: service_healthy
      worker:
        condition: service_healthy
    ports:
      - "5173:5173"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:5173').then(() => process.exit(0)).catch(() => process.exit(1))"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  db-data:
  source-data:
